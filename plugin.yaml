manifest_version: 1
name: hermes-mindgraph-plugin
version: 0.10.0
description: "MindGraph — semantic graph memory with hybrid retrieval, goal/decision tracking, and cross-document synthesis."
author: Shan Rizvi

pip_dependencies:
  - mindgraph-sdk>=0.4.0

requires_env:
  - name: MINDGRAPH_API_KEY
    description: "MindGraph API key"
    url: "https://mindgraph.cloud"
    secret: true
  - name: MINDGRAPH_BASE_URL
    description: "API endpoint (optional — override for self-hosted deployments)"
  - name: MINDGRAPH_AGENT_ID
    description: "Agent identifier stamped onto every write (optional, default: hermes)"
