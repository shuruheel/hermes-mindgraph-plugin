# For pip installation, use: pip install hermes-mindgraph-plugin
# (auto-discovered via the hermes_agent.plugins entry point — no manual copy).
#
# For manual installation, copy this directory to ~/.hermes/plugins/mindgraph/.

name: mindgraph
version: 0.9.0
description: >
  Semantic graph memory for Hermes Agent — persistent knowledge capture,
  hybrid retrieval, goal/decision/plan tracking, long-form content ingestion,
  and project-scoped cross-document synthesis via MindGraph.
author: Shan Rizvi
requires_env:
  - MINDGRAPH_API_KEY
provides_tools:
  - mindgraph_remember
  - mindgraph_retrieve
  - mindgraph_commit
  - mindgraph_ingest
  - mindgraph_synthesize
provides_hooks:
  - on_session_start
  - on_session_end
